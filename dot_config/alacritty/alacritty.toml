[window]
padding = { x = 5 }
dynamic_padding = true
opacity = 0.96
blur = true
decorations = "None"

[scrolling]
history = 0 # manages by tmux

[font]
normal = { family = "FuraMono Nerd Font Mono", style = "Regular" }
bold   = { family = "FuraMono Nerd Font Mono", style = "Bold" }
size = 11.00

[selection]
save_to_clipboard = true

[cursor]
style = "Beam"

[mouse]
hide_when_typing = true
